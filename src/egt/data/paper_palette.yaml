# Paper-wide clade color palette.
#
# Canonical source of truth for every plotting subcommand. Every plot CLI
# accepts `--palette` pointing here (or a user-supplied override); if
# omitted, the shipped file is used. Loader walks a species' lineage
# most-specific first, so a species in Cypriniformes inside Teleost
# inside Vertebrata resolves to Cypriniformes.
#
# Most colors were copied verbatim from the `color_dict_top` map in
# `SplitLossColocTree` (src/egt/plot_alg_fusions.py). I've added a few
# high-level scaffolding clades (Metazoa, Bilateria, Myriazoa,
# Parahoxozoa) so lineage resolution never skips a whole subtree. The
# per-clade selection is biologically-motivated (retention of favorite
# Diptera genera, Mollusc families, vertebrate groups) — not a full
# Linnean tree.

