name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt in early to Node 24 for JS actions that still bundle Node 20
  # (e.g. stefanzweifel/git-auto-commit-action@v5). GitHub will flip
  # this default on 2026-06-02, after which this flag is a no-op.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest,  python-version: "3.10"}
          - {os: ubuntu-latest,  python-version: "3.11"}
          - {os: ubuntu-latest,  python-version: "3.12"}
          - {os: macos-latest,   python-version: "3.10"}
          - {os: macos-latest,   python-version: "3.11"}
          - {os: macos-latest,   python-version: "3.12"}
          - {os: ubuntu-latest,  python-version: "3.13", experimental: true}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install egt + dev extras
        run: pip install ".[dev]"

      - name: Syntax check
        run: python -m compileall -q src/egt

      - name: Run test suite (with coverage)
        run: pytest tests/ -v --tb=short --cov=egt --cov-report=xml:coverage.xml --cov-report=term

      - name: Generate coverage badge
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          pip install "genbadge[coverage]"
          mkdir -p images
          genbadge coverage -i coverage.xml -o images/coverage-badge.svg

      - name: Commit coverage badge
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update coverage badge [skip ci]"
          file_pattern: images/coverage-badge.svg
